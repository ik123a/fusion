apiVersion: apps/v1
kind: Deployment
metadata:
  name: fusion-web
  namespace: fusion
spec:
  replicas: 3
  selector:
    matchLabels:
      app: fusion-web
  template:
    metadata:
      labels:
        app: fusion-web
    spec:
      containers:
      - name: web
        image: fusion/web:latest
        ports:
        - containerPort: 3000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: fusion-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: fusion-secrets
              key: redis-url
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: fusion-web
  namespace: fusion
spec:
  selector:
    app: fusion-web
  ports:
  - port: 80
    targetPort: 3000
  type: LoadBalancer
